<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>工资计算器 - 全能版</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,"微软雅黑",sans-serif}
    body{max-width:450px;margin:0 auto;background:#f5f7fa;padding:8px}
    .header{text-align:center;padding:8px 0;font-size:18px}
    .tab-bar{display:flex;background:#fff;border-radius:12px;padding:4px;gap:6px;margin-bottom:10px}
    .tab-bar button{flex:1;padding:9px;border:none;background:#f1f3f5;border-radius:8px;font-size:15px}
    .tab-bar button.active{background:#007aff;color:#fff}
    .top-tab{display:flex;background:#fff;border-radius:8px;padding:2px;gap:4px;margin-bottom:8px}
    .top-tab button{flex:1;padding:5px;border:none;background:#f1f3f5;border-radius:6px;font-size:14px}
    .top-tab button.active{background:#007aff;color:#fff}
    .page{display:none}
    .page.active{display:block}
    .sub-page{display:none}
    .sub-page.active{display:block}
    .card{background:#fff;border-radius:12px;padding:12px;margin-bottom:10px}
    .item{margin:8px 0}
    label{font-weight:500;margin-bottom:4px;display:block;font-size:14px}
    .date-row{display:flex;gap:6px}
    .date-row select{flex:1;padding:7px;border-radius:8px;border:1px solid #e5e7eb}
    .job-type{display:flex;gap:6px;margin-top:6px}
    .job-type label{flex:1;text-align:center;padding:9px;border:1px solid #e5e7eb;border-radius:8px}
    .job-type input:checked+span{color:#007aff;font-weight:bold}
    input,select{width:100%;padding:7px;border:1px solid #e5e7eb;border-radius:8px;background:#fff}
    .row-3{display:flex;gap:8px}
    .row-3 .item{flex:1}
    .result-card{background:#1f2937;color:#fff;padding:12px;border-radius:10px;text-align:center}
    .btn-row{display:flex;gap:10px;margin-top:10px}
    .btn-row button{flex:1;padding:9px;border:none;border-radius:10px;font-size:15px}
    .btn-save{background:#007aff;color:#fff}
    .btn-clear{background:#ff3b30;color:#fff}
    table {
      width: 100%;
      border-collapse: collapse;
      background: #fff;
      border-radius: 10px;
      overflow-x: auto;
      display: block;
      border: 3px solid #333;
    }
    th, td {
      border: 1px solid #ddd;
      padding: 5px 3px;
      font-size: 11px;
      text-align: center;
      line-height: 1.3;
      word-break: break-word;
    }
    th {
      background: #f9fafb;
      font-weight: 500;
    }
    .date-group-start td,
    .date-group-start th {
      border-top: 2px solid #666;
    }
    .cell-line{display:block;line-height:1.3}
    .del-btn{background:#ff3b30;color:#fff;border:none;padding:3px 6px;border-radius:4px;font-size:11px;cursor:pointer}
    .month-total{background:#007aff;color:#fff;text-align:center;padding:8px;border-radius:10px;margin-bottom:8px}
    .record-stats{display:grid;grid-template-columns:1fr 1fr;gap:6px;margin-bottom:10px}
    .record-stat-item{background:#fff;padding:6px;border-radius:8px;text-align:center;font-size:12px}
    .record-nav{display:flex;gap:8px;margin-bottom:8px}
    .record-nav button{flex:1;padding:7px;border:none;border-radius:8px;background:#007aff;color:#fff}
    .toast{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,0.7);color:#fff;padding:10px 16px;border-radius:10px;display:none;z-index:999}
    .modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);display:none;justify-content:center;align-items:center;z-index:9999}
    .modal-content{background:#fff;width:90%;max-width:320px;padding:15px;border-radius:12px}
    .db-item{display:flex;gap:6px;margin:6px 0}
    .db-item input{flex:1;padding:6px;border-radius:6px;border:1px solid #e5e7eb}
    .db-item button{width:36px;background:#ff3b30;color:#fff;border:none;border-radius:6px;cursor:pointer}
    .sync-card{background:#fff;border-radius:12px;padding:14px;margin-bottom:12px}
    .sync-status{text-align:center;padding:10px;background:#f9fafb;border-radius:8px;margin-bottom:10px}
    .sync-form{display:flex;flex-direction:column;gap:10px}
    .sync-form input{padding:9px;border-radius:8px;border:1px solid #e5e7eb}
    .sync-btns{display:flex;gap:10px;margin-top:6px}
    .sync-btns button{flex:1;padding:9px;background:#007aff;color:#fff;border:none;border-radius:8px;cursor:pointer}
    .btn-bind{background:#34c759}
    .btn-upload{background:#5ac8fa}
    .btn-download{background:#ff9500}
    .sync-warning{color:#ff3b30;font-size:12px;text-align:center;margin-top:8px;padding:4px;background:#fff0f0;border-radius:6px}
    .config-item{display:flex;align-items:center;gap:8px;margin:8px 0}
    .config-item label{flex:1;margin:0}
    .config-item input{flex:2}
    .default-job-config{margin:15px 0;padding-top:15px;border-top:1px solid #f1f3f5}
    .default-job-title{font-size:15px;font-weight:600;margin-bottom:8px}
    .default-job-radio{display:flex;gap:6px}
    .default-job-radio label{flex:1;text-align:center;padding:7px;border:1px solid #e5e7eb;border-radius:6px;margin:0;cursor:pointer}
    .default-job-radio input:checked+span{color:#007aff;font-weight:bold}
    .step-config-section{margin-top:14px}
    .step-job-title{display:flex;justify-content:space-between;align-items:center;margin:10px 0 6px 0}
    .step-job-title h4{font-size:15px;font-weight:600}
    .btn-reset-job{padding:5px 10px;border:1px solid #ccc;border-radius:8px;background:#f1f3f5;font-size:13px;cursor:pointer}
    .step-item{display:flex;align-items:center;gap:6px;margin:5px 0;flex-wrap:nowrap;white-space:nowrap}
    .step-item input{width:80px;padding:6px;font-size:14px;flex-shrink:0}
    .step-item .limit-text{width:70px;background:#f1f3f5;padding:6px;border-radius:6px;text-align:center;font-size:14px;color:#333;flex-shrink:0}
    .step-item span{font-size:14px;flex-shrink:0}
    .step-del{width:32px;height:32px;border:none;border-radius:6px;background:#ff3b30;color:#fff;font-size:16px;flex-shrink:0;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .btn-add-step{width:100%;padding:8px;margin:4px 0 10px 0;border:1px dashed #ccc;border-radius:8px;background:#f8f9fa;font-size:14px;cursor:pointer}
    .step-buttons{display:flex;gap:10px;margin:12px 0}
    .step-buttons button{flex:1;padding:10px;border-radius:10px;font-size:15px;border:none;cursor:pointer}
    .btn-save-step{background:#007aff;color:#fff}
    .btn-reset-all{background:#f1f3f5;color:#333}
    .sync-spinner{display:inline-block;width:14px;height:14px;border:2px solid #fff;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;margin-left:6px;vertical-align:middle}
    @keyframes spin{to{transform:rotate(360deg)}}
    .btn-bind:disabled,.btn-upload:disabled,.btn-download:disabled{opacity:0.6;cursor:not-allowed}
    th:nth-child(4), td:nth-child(4) { min-width: 5.2em; max-width: 6em; word-break: break-word; white-space: normal; }
    th:nth-child(10), td:nth-child(10) { min-width: 3.8em; max-width: 4.5em; word-break: break-word; white-space: normal; }
    th, td { white-space: normal; word-break: break-word; }
    td[rowspan] { vertical-align: middle; }

    .global-loading {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.5);
      z-index: 10000;
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
      backdrop-filter: blur(2px);
    }
    .global-loading .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-bottom: 12px;
    }
    .global-loading span {
      color: white;
      font-size: 14px;
      background: rgba(0,0,0,0.6);
      padding: 6px 12px;
      border-radius: 20px;
    }
    .trash-btn {
      background: #ff9500;
      margin-left: 8px;
    }
    .sub-tab {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
    }
    .sub-tab button {
      flex: 1;
      padding: 6px;
      background: #f1f3f5;
      border: none;
      border-radius: 8px;
      font-size: 13px;
    }
    .sub-tab button.active {
      background: #007aff;
      color: white;
    }
    .month-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
      flex-wrap: wrap;
      gap: 8px;
    }
  </style>
</head>
<body>
<div class="header">工资计算器</div>
<div class="tab-bar">
  <button class="tab-btn active" onclick="showPage('calc')">计算器</button>
  <button class="tab-btn" onclick="showPage('records')">记录</button>
  <button class="tab-btn" onclick="showPage('settings')">设置</button>
</div>
<div class="top-tab">
  <button class="top-tab-btn active" onclick="showSub('auto')">自动计算</button>
  <button class="top-tab-btn" onclick="showSub('manual')">手动输入</button>
</div>
<div id="calc" class="page active">
  <div id="auto" class="sub-page active">
    <div class="card">
      <div class="item"><label>日期</label><div class="date-row"><select id="year"></select><select id="month"></select><select id="day"></select></div></div>
      <div class="item"><label>工种</label><div class="job-type" id="calcJobType"><label><input type="radio" name="job" value="fine" checked><span>精车</span></label><label><input type="radio" name="job" value="center"><span>加工中心</span></label><label><input type="radio" name="job" value="rough"><span>粗车</span></label></div></div>
      <div class="item"><label>备注</label><input id="remark" placeholder="选填"></div>
      <div class="item"><label>产品型号</label><input id="model" placeholder="字母自动转大写；输入自动匹配系数"></div>
      <div class="row-3"><div class="item"><label>产量</label><input type="number" id="output" min="0" step="1" value="0"></div><div class="item"><label>系数</label><input type="number" id="factor" value="1.0" step="0.01" min="0"></div><div class="item"><label>补工时(小时)</label><input type="number" id="extra" value="0" step="0.1" min="0"></div></div>
    </div>
    <div class="result-card"><div id="avg">平均单价：¥0.00</div><div id="total" style="margin-top:4px;font-size:16px">总额：¥0.00</div></div>
    <div class="btn-row"><button class="btn-save" onclick="saveAuto()">保存</button><button class="btn-clear" onclick="clearAuto()">清空</button></div>
  </div>
  <div id="manual" class="sub-page">
    <div class="card"><div class="item"><label>日期</label><div class="date-row"><select id="mYear"></select><select id="mMonth"></select><select id="mDay"></select></div></div><div class="item"><label>型号</label><input id="mModel" placeholder="字母自动转大写"></div><div class="item"><label>工资金额</label><input type="number" id="mSalary" min="0" step="0.01" oninput="renderManualResult()"></div><div class="item"><label>备注</label><input id="mRemark"></div></div>
    <div class="result-card" style="margin-bottom:10px"><div id="mTotal" style="font-size:16px">金额：¥0.00</div></div>
    <div class="btn-row"><button class="btn-save" onclick="saveManual()">保存</button><button class="btn-clear" onclick="clearManual()">清空</button></div>
  </div>
</div>
<div id="records" class="page">
  <div class="card">
    <div class="sub-tab"><button id="showRecordsTab" class="active" onclick="switchRecordView('records')">正常记录</button><button id="showTrashTab" onclick="switchRecordView('trash')">回收站</button></div>
    <div id="normalRecordsView">
      <div class="month-header">
        <div class="item" style="flex:1; margin:0;"><label>选择月份</label><input type="month" id="recordMonth" onchange="renderRecords()"></div>
      </div>
      <div class="record-nav"><button onclick="prevMonth()">←上月</button><button onclick="nextMonth()">下月→</button></div>
      <div class="month-total" id="monthMoney">当月总计：¥0.00</div>
      <div class="record-stats"><div class="record-stat-item">总产量：<span id="outTotal">0</span></div><div class="record-stat-item">精车：<span id="outFine">0</span></div><div class="record-stat-item">加工中心：<span id="outCenter">0</span></div><div class="record-stat-item">粗车：<span id="outRough">0</span></div></div>
      <div style="overflow-x:auto"><table><thead><tr><th>序号</th><th>日期</th><th>类型</th><th>型号</th><th>数量</th><th>系数</th><th>工时(h)</th><th>工资</th><th>小计</th><th>备注</th><th>操作</th></tr></thead><tbody id="recordList"></tbody></table></div>
    </div>
    <div id="trashRecordsView" style="display:none;">
      <div style="margin-bottom:10px;display:flex;gap:8px;"><button onclick="emptyTrash()" style="flex:1;background:#ff3b30;color:#fff;border:none;padding:8px;border-radius:8px;">清空回收站</button><button onclick="restoreAllTrash()" style="flex:1;background:#34c759;color:#fff;border:none;padding:8px;border-radius:8px;">全部恢复</button></div>
      <div style="overflow-x:auto"><table><thead><tr><th>序号</th><th>删除日期</th><th>原日期</th><th>类型</th><th>型号</th><th>工资</th><th>备注</th><th>操作</th></tr></thead><tbody id="trashList"></tbody></table></div>
    </div>
  </div>
</div>
<div id="settings" class="page">
  <div class="sync-card"><div class="sync-status" id="syncStatus">未绑定同步账号</div><div class="sync-form"><input id="syncAccount" placeholder="设置一个同步账号（字母数字组合）" type="text"><div class="sync-btns"><button class="btn-bind" id="bindBtn" onclick="bindAccount()">绑定/切换账号</button><button class="btn-upload" id="uploadBtn" onclick="syncUpload()">上传到云端</button><button class="btn-download" id="downloadBtn" onclick="syncDownload()">从云端下载（合并）</button></div></div><div class="sync-warning">⚠️ 云端操作时请勿关闭页面</div></div>
  <div class="card"><h3 style="text-align:center;margin-bottom:10px;font-size:16px">基础配置</h3><div class="config-item"><label>补工时单价（元/小时）</label><input type="number" id="extraPrice" min="0" step="0.01" onchange="saveConfig()"></div><div class="default-job-config"><div class="default-job-title">默认工种选择</div><div class="default-job-radio" id="defaultJobRadio"><label><input type="radio" name="defaultJob" value="fine" checked><span>精车</span></label><label><input type="radio" name="defaultJob" value="center"><span>加工中心</span></label><label><input type="radio" name="defaultJob" value="rough"><span>粗车</span></label></div><button onclick="saveDefaultJob()" style="width:100%;margin-top:8px;padding:8px;background:#007aff;color:#fff;border:none;border-radius:8px;font-size:14px">保存默认工种</button></div>
    <div class="step-config-section"><h3 style="text-align:center;margin:14px 0 8px;font-size:16px">阶梯价格配置</h3><div class="step-job-block" data-job="fine"><div class="step-job-title"><h4>精车</h4><button class="btn-reset-job" onclick="resetJobStep('fine')">恢复默认</button></div><div id="stepList_fine"></div><button class="btn-add-step" onclick="addStep('fine')">+ 添加阶梯</button></div><div class="step-job-block" data-job="center"><div class="step-job-title"><h4>加工中心</h4><button class="btn-reset-job" onclick="resetJobStep('center')">恢复默认</button></div><div id="stepList_center"></div><button class="btn-add-step" onclick="addStep('center')">+ 添加阶梯</button></div><div class="step-job-block" data-job="rough"><div class="step-job-title"><h4>粗车</h4><button class="btn-reset-job" onclick="resetJobStep('rough')">恢复默认</button></div><div id="stepList_rough"></div><button class="btn-add-step" onclick="addStep('rough')">+ 添加阶梯</button></div><div class="step-buttons"><button class="btn-save-step" onclick="saveStepConfig()">保存阶梯设置</button><button class="btn-reset-all" onclick="resetAllStep()">恢复全部默认</button></div></div>
    <div style="margin-top:12px;"><button onclick="openDb()" style="width:100%;background:#007aff;color:#fff;border:none;padding:10px;border-radius:8px;">产品系数库</button></div>
  </div>
</div>
<div class="modal" id="dbModal"><div class="modal-content"><h3 style="text-align:center;margin-bottom:10px">系数库</h3><div id="dbList"></div><div class="db-item"><input id="newModel" placeholder="字母自动转大写；输入型号"><input id="newFactor" placeholder="系数" type="number" step="0.01" min="0"><button onclick="addFactor()">+</button></div><button onclick="closeDb()" style="margin-top:12px;width:100%;padding:8px;background:#007aff;color:#fff;border:none;border-radius:8px">关闭</button></div></div>
<div class="toast" id="toast"></div>
<div class="global-loading" id="globalLoading"><div class="spinner"></div><span>加载中...</span></div>

<script>
// ======================== 基础配置 ========================
const SUPABASE_URL = "https://mjtkqsosgpfhwmmkspku.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_VxtZFH7hjsrQJMv_2DsCyA_9J505P9j";
let records = [];
let trash = [];
let factorMap = {};
let config = { extraPrice: 18, defaultJob: "fine" };
let syncAccount = localStorage.getItem("syncAccount") || "";
let cloudInitialized = false;
const DEFAULT_STEP = {
  fine:   [{ limit: 90, price: 1.9 }, { limit: 100, price: 2.35 }, { limit: Infinity, price: 2.88 }],
  center: [{ limit: 90, price: 1.53 }, { limit: 100, price: 2.03 }, { limit: Infinity, price: 2.53 }],
  rough:  [{ limit: 90, price: 1.7 }, { limit: 100, price: 2.2 }, { limit: Infinity, price: 2.7 }]
};
let stepConfig = JSON.parse(JSON.stringify(DEFAULT_STEP));

function showLoading() { document.getElementById("globalLoading").style.display = "flex"; }
function hideLoading() { document.getElementById("globalLoading").style.display = "none"; }
function toast(text) { const t = document.getElementById("toast"); t.innerText = text; t.style.display = "block"; setTimeout(() => t.style.display = "none", 2000); }
function setButtonsLoading(loading) { const btns = ["bindBtn","uploadBtn","downloadBtn"]; btns.forEach(id => { const btn = document.getElementById(id); if(btn) btn.disabled = loading; }); }

function saveTrash() { localStorage.setItem("trash", JSON.stringify(trash)); }
function loadTrash() { trash = JSON.parse(localStorage.getItem("trash") || "[]"); }

function moveToTrash(recordId) {
  const index = records.findIndex(r => r.id == recordId);
  if (index === -1) return false;
  const deletedRecord = records[index];
  deletedRecord.deletedAt = Date.now();
  trash.unshift(deletedRecord);
  records.splice(index, 1);
  persistRecords();
  saveTrash();
  renderRecords();
  renderTrashList();
  toast("已移至回收站，可在回收站中恢复");
  return true;
}

function restoreFromTrash(trashId) {
  const idx = trash.findIndex(t => t.id == trashId);
  if (idx === -1) return;
  const restored = trash[idx];
  delete restored.deletedAt;
  records.push(restored);
  trash.splice(idx, 1);
  persistRecords();
  saveTrash();
  renderRecords();
  renderTrashList();
  toast("已恢复记录");
}
function restoreAllTrash() {
  if (trash.length === 0) return toast("回收站为空");
  records.push(...trash.map(t => { delete t.deletedAt; return t; }));
  trash = [];
  persistRecords();
  saveTrash();
  renderRecords();
  renderTrashList();
  toast("已恢复所有记录");
}
function emptyTrash() {
  if (trash.length === 0) return toast("回收站已空");
  if (confirm("永久清空回收站？不可恢复！")) {
    trash = [];
    saveTrash();
    renderTrashList();
    toast("回收站已清空");
  }
}
function renderTrashList() {
  const tbody = document.getElementById("trashList");
  if (!tbody) return;
  tbody.innerHTML = "";
  trash.forEach((item, idx) => {
    const tr = document.createElement("tr");
    tr.innerHTML = `
      <td>${idx+1}</td>
      <td>${new Date(item.deletedAt).toLocaleDateString()}</td>
      <td>${item.date}</td>
      <td>${item.type}</td>
      <td>${item.model || '-'}</td>
      <td>¥${item.salary.toFixed(2)}</td>
      <td>${item.remark || '-'}</td>
      <td><button class="del-btn" style="background:#34c759;" onclick="restoreFromTrash('${item.id}')">恢复</button></td>
    `;
    tbody.appendChild(tr);
  });
}
function switchRecordView(view) {
  const normalDiv = document.getElementById("normalRecordsView");
  const trashDiv = document.getElementById("trashRecordsView");
  const normalBtn = document.getElementById("showRecordsTab");
  const trashBtn = document.getElementById("showTrashTab");
  if (view === 'records') {
    normalDiv.style.display = "block";
    trashDiv.style.display = "none";
    normalBtn.classList.add("active");
    trashBtn.classList.remove("active");
    renderRecords();
  } else {
    normalDiv.style.display = "none";
    trashDiv.style.display = "block";
    trashBtn.classList.add("active");
    normalBtn.classList.remove("active");
    renderTrashList();
  }
}

function enforceCorrectStepPrices() {
  const correctPrices = { fine: 2.88, center: 2.53, rough: 2.7 };
  for (let job of ['fine', 'center', 'rough']) {
    let steps = stepConfig[job];
    if (!steps || !Array.isArray(steps)) { stepConfig[job] = JSON.parse(JSON.stringify(DEFAULT_STEP[job])); continue; }
    let infiniteIdx = -1;
    for (let i = 0; i < steps.length; i++) { if (!isFinite(steps[i].limit)) { infiniteIdx = i; break; } }
    if (infiniteIdx !== -1) steps[infiniteIdx].price = correctPrices[job];
    else steps.push({ limit: Infinity, price: correctPrices[job] });
    let finite = steps.filter(s => isFinite(s.limit)).sort((a,b) => a.limit - b.limit);
    let infinite = steps.filter(s => !isFinite(s.limit));
    if (infinite.length > 1) infinite = [infinite[0]];
    stepConfig[job] = [...finite, ...infinite];

function normalizeSteps(job) {
  let steps = stepConfig[job] || [];
  let finite = steps.filter(s => typeof s.limit === 'number' && isFinite(s.limit) && s.limit > 0);
  let infinite = steps.filter(s => !isFinite(s.limit));
  finite.sort((a,b) => a.limit - b.limit);
  let unique = [];
  for (let s of finite) { if (unique.length === 0 || unique[unique.length-1].limit !== s.limit) unique.push({ limit: s.limit, price: s.price }); }
  let infinitePrice = (infinite.length > 0 && typeof infinite[0].price === 'number') ? infinite[0].price : (unique.length ? unique[unique.length-1].price : 2.0);
  stepConfig[job] = [...unique, { limit: Infinity, price: infinitePrice }];
  return stepConfig[job];
}
function calcByStep(job, qty) {
  if (!job || qty <= 0) return 0;
  const steps = normalizeSteps(job);
  let total = 0, prev = 0;
  for (let i = 0; i < steps.length; i++) {
    const curLimit = steps[i].limit, price = steps[i].price;
    const upper = isFinite(curLimit) ? curLimit : qty;
    if (upper <= prev) continue;
    const seg = Math.min(qty, upper) - prev;
    if (seg > 0) total += seg * price;
    prev = upper;
    if (prev >= qty) break;
  }
  return total;
}
function calc() {
  const job = document.querySelector('input[name="job"]:checked')?.value;

  let fac = parseFloat(document.getElementById("factor").value) || 1;
  let ext = parseFloat(document.getElementById("extra").value) || 0;
  let extraPrice = (typeof config.extraPrice === 'number') ? config.extraPrice : 18;
  const baseSalary = calcByStep(job, qty);
  const total = baseSalary * fac + ext * extraPrice;
  const avgPrice = qty > 0 ? total / qty : 0;
  document.getElementById("avg").innerText = `平均单价：¥${avgPrice.toFixed(2)}`;
  document.getElementById("total").innerText = `总额：¥${total.toFixed(2)}`;
  return total;
}

function updateStepFromDom(job){ const container=document.getElementById(`stepList_${job}`); const items=container.querySelectorAll(".step-item"); const newSteps=[]; for(let i=0;i<items.length;i++){ const isLast=(i===items.length-1); let limit=Infinity; if(!isLast){ const limitInput=items[i].querySelector("input[type='number']:first-of-type"); if(limitInput) limit=parseFloat(limitInput.value)||0; } const priceInputs=items[i].querySelectorAll("input[type='number']"); const price=parseFloat(priceInputs[priceInputs.length-1].value)||0; newSteps.push({limit,price}); } stepConfig[job]=newSteps; enforceCorrectStepPrices(); normalizeSteps(job); renderStepList(job); calc(); }
